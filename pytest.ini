[pytest]
# Where tests live
testpaths = api_tests/tests ui_tests/tests

# Custom markers (run subsets with:  pytest -m smoke)
markers =
    smoke: critical-path smoke tests
    regression: full regression tests
    negative: negative / validation tests
    ui: Selenium UI tests

# Default options: verbose, short tracebacks, self-contained HTML report
addopts = -v --tb=short --html=reports/pytest-report.html --self-contained-html

# Live logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-5s | %(message)s
